# ============================================================
# CloudBox — local development stack
#   docker compose up --build
# Services: PostgreSQL (metadata), MinIO (object storage), backend API.
# The frontend is added in M5/M6.
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: cloudbox-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cloudbox}
      POSTGRES_USER: ${POSTGRES_USER:-cloudbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudbox_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudbox} -d ${POSTGRES_DB:-cloudbox}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: cloudbox-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the bucket on first run, then exits.
  minio-init:
    image: minio/mc:latest
    container_name: cloudbox-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-cloudbox-files} &&
      echo 'Bucket ready: ${MINIO_BUCKET:-cloudbox-files}'
      "

  backend:
    build:
      context: ./backend
    container_name: cloudbox-backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cloudbox}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-cloudbox}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-cloudbox_dev_password}
      STORAGE_ENDPOINT: http://minio:9000
      # Browser-reachable endpoint for presigned URLs (host-mapped MinIO port)
      STORAGE_PUBLIC_ENDPOINT: http://localhost:9000
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STORAGE_BUCKET: ${MINIO_BUCKET:-cloudbox-files}
      JWT_SECRET: ${JWT_SECRET:-ZmFrZS1kZXYtc2VjcmV0LWNoYW5nZS1tZS1wbGVhc2UtMTIzNDU2Nzg5MA==}
      # Browser origins allowed to call the API (dockerized frontend :3000, Vite dev :5173)
      APP_CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"
      # Google OAuth (blank by default → disabled). Set these in .env to enable.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OAUTH_SUCCESS_REDIRECT: ${OAUTH_SUCCESS_REDIRECT:-http://localhost:3000/oauth/callback}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./frontend
    container_name: cloudbox-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres-data:
  minio-data:
