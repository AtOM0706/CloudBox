<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="baseD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b1e25"/>
      <stop offset="50%" stop-color="#16181e"/>
      <stop offset="100%" stop-color="#101218"/>
    </linearGradient>
    <filter id="softD" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#baseD)"/>

  <!-- monochrome dark-grey blobs: lightness variation for the glass to refract -->
  <g filter="url(#softD)" opacity="0.9">
    <circle cx="240" cy="200" r="260" fill="#2a2e38"/>
    <circle cx="1380" cy="170" r="280" fill="#15171d"/>
    <circle cx="1280" cy="820" r="320" fill="#2d323d"/>
    <circle cx="320" cy="860" r="300" fill="#191c22"/>
    <circle cx="820" cy="500" r="260" fill="#23262f"/>
    <circle cx="760" cy="120" r="200" fill="#30343f"/>
  </g>
</svg>
