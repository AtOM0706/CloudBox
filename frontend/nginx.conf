server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow larger uploads to flow through to the backend
    client_max_body_size 100M;

    # Use Docker's embedded DNS so the backend hostname is re-resolved at
    # request time (survives backend container restarts / new IPs).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA fallback — let React Router handle client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + docs to the backend service (compose network).
    # The hostname is in a variable so nginx resolves it per request via $resolver;
    # $request_uri forwards the original path + query string verbatim.
    location /api/ {
        set $backend backend:8080;
        proxy_pass http://$backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /swagger-ui/ {
        set $backend backend:8080;
        proxy_pass http://$backend$request_uri;
    }
    location /v3/api-docs {
        set $backend backend:8080;
        proxy_pass http://$backend$request_uri;
    }

    # Cache hashed static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
